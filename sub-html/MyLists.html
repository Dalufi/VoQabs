<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lists</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../assets/favicon.ico">
</head>
<body>
    
   <!--Main Menu-->
    <div id="ListMenu">
     
        <h1 class="headline">My Lists</h1>

         <div id="ListContainer">

            <!-- Lists will be dynamically added here -->

        </div>

        <button class="ExportAll" id="ExportButton">Export all Lists (coming out soon)</button>
        <input class="ImportMy" type="file" id="ImportInput" accept=".json" placeholder="Import Lists (coming out soon)">

    </div>

    <div id="ViewMenu" class="hidden">
        <h1 id="ViewListName"></h1>
        <p id="ViewListLanguages"></p>
        
        <table>
            <tbody id="ViewTable">
                <!-- Vocabulary pairs will be dynamically added here for the user to view them -->
            </tbody>
        </table>

        <!-- Note: Make the edit menu functional -->
        <div id="MyListEditMenu" class="hidden">
            <input type="text" id="MyEditWord1" placeholder="">
            <input type="text" id="MyEditWord2" placeholder="">

            <button id="MySaveEdit">Save Edit</button>
            <button id="MyCancelEdit">Cancel Edit</button>
        </div>

        <div id="MyListEditNameMenu" class="hidden">
            <div class="EditText">
            <input type="text" id="MyEditListNameInput" placeholder="Edit List Name">
            </div>

            <div class="SaveCancelList">
            <button class="SaveEdit" id="MySaveListNameEdit">Save List Name</button>
            <button class="CancelEdit" id="MyCancelListNameEdit">Cancel List Name Edit</button>
            </div>
        </div>
    
        <div class="CloseEdit">
        <button class="CloseMy" id="BackToMyLists">Close</button>
        <button class="EditMy" id="EditMyListName">Edit List Name</button>
        </div>
    </div>

    <img id="BackToMain" src="../assets/VoQabs_Logo.png" class="clickable">

    <script src="../script.js"></script>

</body>
</html>
