<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lists</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    
   <!--Main Menu-->
    <div id="ListMenu">
     
        <h1>My Lists</h1>

         <div id="ListContainer">

            <!-- Lists will be dynamically added here -->

        </div>

        <button id="ExportButton">Export all Lists</button>
        <input type="file" id="ImportInput" accept=".json" placeholder="Import Lists">

     <button onclick="window.open('/index.html', '_self')">Back</button>

    </div>

    <div id="ViewMenu" class="hidden">
        <h1 id="ViewListName"></h1>
        <p id="ViewListLanguages"></p>
        
        <table>
            <tbody id="ViewTable">
                <!-- Vocabulary pairs will be dynamically added here for the user to view them -->
            </tbody>
        </table>
    
        <button id="BackToMyLists">Close</button>
    </div>

    <script src="/script.js"></script>

</body>
</html>
