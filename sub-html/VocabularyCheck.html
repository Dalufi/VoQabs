<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoQabs quiz</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../assets/favicon.ico">
</head>
<body>

    <!-- page menu -->
    <div id="VocabularyCheckMenu">

      <h1>Select a list!</h1>
      <h3>Choose one of your lists to check your vocabulary knowledge!</h3>

      <div id="VocabularyChecklistContainer">

        <!-- This is where the lists will be dynamically loaded by script.js -->

      </div>
    
    </div>

    <div id="VocabularyCheck" class="hidden">

      <div id="VocabularyCheckSelection" class="hidden">
        <!-- This will contain the "setup" for the quiz -->

        <h2>Select the output language!</h2>

        <button id="LanguageOutput1"></button>
        <button id="LanguageOutput2"></button>

        <button id="Back1">Cancel</button>

      </div>

      <div id="SelectionConfirm" class="hidden">

        <h2 id="ConfirmPrompt">Nothing lol</h2>

        <button id="ConfirmPromptYes">Start</button>
        <button id="ConfirmPromptNo">No</button>

      </div>

      <!-- This will contain the quiz questions-->
      <div id="VocabularyQuiz" class="hidden">
        
        <h2 id="QuestionWord">???</h2>
        <input type="text" id="QuestionAnswer" name="QuestoinAnswer" placeholder="Please enter the word in [language]">
        <button id="EnterQuestion">Enter</button>

        <div id="CorrectWrong" class="hidden">
          <h3 id="CorrectWrongResult">Pending...</h3>
          <button id="CorrectWrongNext">Next!</button>
        </div>

        <button id="CancelQuiz">End Quiz!</button>

      </div>

      <div id="Results" class="hidden">
         
        <h2 id="ResultsText">You are uh yes</h2>
        <h3 id="ResultPrecent"></h3>
        <h4 id="WrongWordsText" class="hidden">Here are the words you didn't know:</h4>
        <h4 id="AllRightWordsText" class="hidden">Congratulation! You've completed the quiz without any mistakes!</h4>

        <div id="ResultsContainer">
          <!-- This will show the resulted words -->
        </div>

        <button id="RefreshRoundButton" class="hidden">Refresh Round!</button>
        <button id="EndQuiz">End the Quiz!</button>

      </div>

      <div id="RefreshRoundPrompt" class="hidden">

        <h2>Ready to start your refresh round?</h2>
        <button id="StartRefreshRound">Start</button>
        <button id="CancelRefreshRound">Cancel</button>

      </div>


    </div>

    <img id="VocabularyCheckerHome" src="../assets/VoQabs_Logo.png" class="clickable">

    <script src="../script.js"></script>

</body>
</html>
